# PostgreSQL dédié aux tests E2E INC-01 — reproductible via Docker Compose
# Usage : npm run db:test:up

services:
  postgres:
    image: postgres:16-alpine
    container_name: chantiers360-v2-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chantiers360_v2_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chantiers360_v2_test"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    volumes:
      - chantiers360_v2_test_data:/var/lib/postgresql/data

volumes:
  chantiers360_v2_test_data:
